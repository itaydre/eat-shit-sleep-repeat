<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Onboarding — Eat shit sleep repeat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: #FAF6F1;
            color: #3D3229;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .onboarding {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
            padding: 0 24px;
            padding-top: calc(16px + env(safe-area-inset-top, 0px));
            padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
        }

        /* Steps */
        .step { display: none; flex-direction: column; flex: 1; }
        .step.active { display: flex; }

        .step-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            min-height: 36px;
        }

        .btn-back {
            background: none;
            border: none;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            color: #9A8A7A;
            font-size: 1.2rem;
            flex-shrink: 0;
            background: #F0EBE4;
        }

        .btn-back:active { opacity: 0.7; }

        /* Progress */
        .progress {
            display: flex;
            gap: 6px;
            flex: 1;
        }

        .progress-dot {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: #E8E0D6;
            transition: background 0.3s ease;
        }

        .progress-dot.done {
            background: #5A4A3A;
        }

        .step-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Section label */
        .section-label {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #9A8A7A;
            margin-bottom: 16px;
        }

        /* Typography */
        .step h2 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: #3D3229;
            line-height: 28px;
            margin-bottom: 6px;
        }

        .step .subtitle {
            font-size: 14px;
            font-weight: 400;
            color: #9A8A7A;
            line-height: 20px;
            margin-bottom: 32px;
        }

        /* Inputs */
        .input-group { margin-bottom: 12px; }

        .input-label {
            font-size: 12px;
            font-weight: 500;
            color: #9A8A7A;
            margin-bottom: 6px;
            display: block;
        }

        .input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #E8E0D6;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            font-family: inherit;
            background: #fff;
            color: #3D3229;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input:focus {
            border-color: #5A4A3A;
            box-shadow: 0 0 0 3px rgba(90,74,58,0.08);
        }

        .input::placeholder {
            color: #C4B8AA;
        }

        /* Gender pills */
        .gender-group {
            display: flex;
            gap: 12px;
        }

        .gender-btn {
            flex: 1;
            padding: 20px 16px;
            border: 2px solid #E8E0D6;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            background: #fff;
            cursor: pointer;
            font-family: inherit;
            text-align: center;
            color: #3D3229;
            transition: all 0.2s ease;
        }

        .gender-btn .gender-emoji {
            font-size: 2.2rem;
            display: block;
            margin-bottom: 8px;
        }

        .gender-btn:active { transform: scale(0.97); }

        .gender-btn.active {
            border-color: #5A4A3A;
            background: #F5EFE8;
        }

        /* Bottom actions */
        .step-actions {
            padding: 12px 0;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #5A4A3A;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:active { opacity: 0.85; transform: scale(0.99); }
        .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-skip {
            width: 100%;
            padding: 12px;
            background: none;
            border: none;
            color: #9A8A7A;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            margin-top: 4px;
        }

        /* Summary card */
        .summary-card {
            background: #fff;
            border-radius: 16px;
            padding: 4px 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
        }

        .summary-row + .summary-row {
            border-top: 1px solid #F0EBE4;
        }

        .summary-label {
            font-size: 13px;
            font-weight: 500;
            color: #9A8A7A;
        }

        .summary-value {
            font-size: 14px;
            font-weight: 600;
            color: #3D3229;
        }

        /* Invite */
        .invite-section {
            margin-top: 20px;
        }

        .invite-label {
            font-size: 13px;
            color: #9A8A7A;
            margin-bottom: 8px;
            line-height: 18px;
        }

        /* Splash */
        .splash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FAF6F1;
            z-index: 999;
            transition: opacity 0.3s ease;
        }

        .splash-word {
            font-size: 28px;
            font-weight: 800;
            color: #3D3229;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
    </style>
</head>
<body>
    <div class="splash" id="splash">
        <div class="splash-word" id="splash-word"></div>
    </div>

    <div class="onboarding" id="onboarding" style="display:none;">

        <!-- Step 1: Name -->
        <div class="step active" id="step-1">
            <div class="step-top">
                <div class="progress" id="progress-1"></div>
            </div>
            <div class="step-content">
                <h2>What's your baby's name?</h2>
                <div class="subtitle">We'll use this throughout the app</div>
                <div class="input-group">
                    <input type="text" class="input" id="ob-name" placeholder="e.g. Maya" autofocus>
                </div>
            </div>
            <div class="step-actions">
                <button class="btn-primary" id="btn-step1" onclick="goStep(2)" disabled>Continue</button>
            </div>
        </div>

        <!-- Step 2: Birthday -->
        <div class="step" id="step-2">
            <div class="step-top">
                <button class="btn-back" onclick="goStep(1)">&#8249;</button>
                <div class="progress" id="progress-2"></div>
            </div>
            <div class="step-content">
                <h2>When were they born?</h2>
                <div class="subtitle">This helps us track their age precisely</div>
                <div class="input-group">
                    <label class="input-label">Date</label>
                    <input type="date" class="input" id="ob-dob">
                </div>
                <div class="input-group">
                    <label class="input-label">Time</label>
                    <input type="time" class="input" id="ob-time">
                </div>
            </div>
            <div class="step-actions">
                <button class="btn-primary" onclick="goStep(3)">Continue</button>
                <button class="btn-skip" onclick="goStep(3)">Skip for now</button>
            </div>
        </div>

        <!-- Step 3: Gender & Weight -->
        <div class="step" id="step-3">
            <div class="step-top">
                <button class="btn-back" onclick="goStep(2)">&#8249;</button>
                <div class="progress" id="progress-3"></div>
            </div>
            <div class="step-content">
                <h2>A few more details</h2>
                <div class="subtitle">Optional — helps personalize the experience</div>
                <div class="section-label">Gender</div>
                <div class="gender-group" style="margin-bottom:24px;">
                    <button type="button" class="gender-btn" onclick="pickGender(this, 'boy')">
                        <span class="gender-emoji">👦</span>Boy
                    </button>
                    <button type="button" class="gender-btn" onclick="pickGender(this, 'girl')">
                        <span class="gender-emoji">👧</span>Girl
                    </button>
                </div>
                <div class="input-group">
                    <label class="input-label">Birth weight</label>
                    <input type="number" class="input" id="ob-weight" placeholder="e.g. 3200g">
                </div>
            </div>
            <div class="step-actions">
                <button class="btn-primary" onclick="goStep(4)">Continue</button>
                <button class="btn-skip" onclick="goStep(4)">Skip for now</button>
            </div>
        </div>

        <!-- Step 4: Summary + Invite -->
        <div class="step" id="step-4">
            <div class="step-top">
                <button class="btn-back" onclick="goStep(3)">&#8249;</button>
                <div class="progress" id="progress-4"></div>
            </div>
            <div class="step-content">
                <h2>All set!</h2>
                <div class="subtitle">Here's a summary of your baby's profile</div>
                <div class="summary-card" id="summary"></div>
                <div class="invite-section">
                    <div class="invite-label">Have a partner? Enter their invite code to share data</div>
                    <input type="text" class="input" id="ob-invite" placeholder="Paste invite code">
                </div>
            </div>
            <div class="step-actions">
                <button class="btn-primary" onclick="finish()">Let's go!</button>
            </div>
        </div>
    </div>

    <script>
        let selectedGender = '';

        async function playSplash() {
            const words = [
                { text: 'EAT', emoji: '🍼' },
                { text: 'SHIT', emoji: '💩' },
                { text: 'SLEEP', emoji: '😴' },
                { text: 'REPEAT', emoji: '🔁' },
            ];
            const el = document.getElementById('splash-word');
            await new Promise(r => setTimeout(r, 200));
            for (let loop = 0; loop < 2; loop++) {
                for (const word of words) {
                    el.textContent = word.text + ' ' + word.emoji;
                    el.style.opacity = '1';
                    await new Promise(r => setTimeout(r, 400));
                    el.style.opacity = '0';
                    await new Promise(r => setTimeout(r, 120));
                }
            }
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('onboarding').style.display = 'flex';
            }, 300);
        }

        const nameInput = document.getElementById('ob-name');
        nameInput.addEventListener('input', () => {
            document.getElementById('btn-step1').disabled = !nameInput.value.trim();
        });

        function pickGender(btn, gender) {
            selectedGender = gender;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const totalSteps = 4;

        function updateProgress(step) {
            for (let s = 1; s <= totalSteps; s++) {
                const bar = document.getElementById('progress-' + s);
                bar.innerHTML = '';
                for (let i = 1; i <= totalSteps; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'progress-dot' + (i <= step ? ' done' : '');
                    bar.appendChild(dot);
                }
            }
        }

        function goStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step-' + n).classList.add('active');
            updateProgress(n);
            if (n === 4) renderSummary();
        }

        updateProgress(1);

        function renderSummary() {
            const name = document.getElementById('ob-name').value.trim();
            const dob = document.getElementById('ob-dob').value;
            const time = document.getElementById('ob-time').value;
            const weight = document.getElementById('ob-weight').value;
            const genderLabel = selectedGender === 'boy' ? '👦 Boy' : selectedGender === 'girl' ? '👧 Girl' : '—';

            let dobDisplay = '—';
            if (dob) {
                const d = new Date(dob + (time ? 'T' + time : ''));
                dobDisplay = d.toLocaleDateString([], { month: 'long', day: 'numeric', year: 'numeric' });
                if (time) dobDisplay += ', ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }

            document.getElementById('summary').innerHTML = `
                <div class="summary-row">
                    <span class="summary-label">Name</span>
                    <span class="summary-value">${name || '—'}</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">Born</span>
                    <span class="summary-value">${dobDisplay}</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">Gender</span>
                    <span class="summary-value">${genderLabel}</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">Weight</span>
                    <span class="summary-value">${weight ? weight + 'g' : '—'}</span>
                </div>
            `;
        }

        function finish() {
            const name = document.getElementById('ob-name').value.trim();
            const dob = document.getElementById('ob-dob').value;
            const time = document.getElementById('ob-time').value;
            const weight = document.getElementById('ob-weight').value;
            const invite = document.getElementById('ob-invite').value.trim();

            console.log('Onboarding complete:', {
                baby_name: name,
                baby_birthdate: dob && time ? dob + 'T' + time : dob || null,
                baby_birth_weight: weight ? Number(weight) : null,
                baby_gender: selectedGender || null,
                invite_code: invite || null,
            });

            alert('Profile created! (standalone demo — check console for data)');
        }

        playSplash();
    </script>
</body>
</html>
