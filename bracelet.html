<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baby Bracelet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #FAF6F1;
            overflow: hidden;
            touch-action: none;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        #colors {
            position: fixed;
            bottom: 60px;
            left: 0; right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .color-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .color-btn.active {
            border-color: #5a4a3a;
            transform: scale(1.15);
        }
        #info {
            position: fixed;
            bottom: 24px;
            left: 0; right: 0;
            text-align: center;
            font-size: 13px;
            color: #9A8A7A;
            pointer-events: none;
            font-family: system-ui, sans-serif;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="colors">
        <button class="color-btn active" data-color="#f5f0ea" style="background:#f5f0ea;" onclick="setColor(this)"></button>
        <button class="color-btn" data-color="#d4e6f1" style="background:#d4e6f1;" onclick="setColor(this)"></button>
        <button class="color-btn" data-color="#f5d5d5" style="background:#f5d5d5;" onclick="setColor(this)"></button>
        <button class="color-btn" data-color="#d5f5d5" style="background:#d5f5d5;" onclick="setColor(this)"></button>
        <button class="color-btn" data-color="#f0e4f5" style="background:#f0e4f5;" onclick="setColor(this)"></button>
    </div>
    <div id="info">Drag to rotate</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://esm.sh/three@0.171.0",
            "three/addons/": "https://esm.sh/three@0.171.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const babyInfo = {
            name: 'Baby Dreyfus',
            date: 'March 14, 2026',
            time: '10:30 AM',
            weight: '3,200g',
            gender: 'Boy',
            id: '13672332'
        };

        // --- Renderer ---
        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 6);

        const controls = new OrbitControls(camera, canvas);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;
        controls.target.set(0, 0, 0);

        // --- Lighting ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const keyLight = new THREE.DirectionalLight(0xfff8ee, 1.4);
        keyLight.position.set(4, 6, 5);
        scene.add(keyLight);
        const fillLight = new THREE.DirectionalLight(0xeef0ff, 0.5);
        fillLight.position.set(-4, 3, -3);
        scene.add(fillLight);

        // --- Band texture with info + holes ---
        let currentColor = '#f5f0ea';

        function createBandTexture(info, bgColor) {
            const c = document.createElement('canvas');
            c.width = 2048;
            c.height = 256;
            const ctx = c.getContext('2d');

            // Background
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, 2048, 256);

            // Subtle plastic grain
            for (let i = 0; i < 5000; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.015})`;
                ctx.fillRect(Math.random() * 2048, Math.random() * 256, 1, 1);
            }

            // Holes on the left third
            for (let i = 0; i < 8; i++) {
                const hx = 80 + i * 70;
                const hy = 128;
                ctx.save();
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(hx, hy, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                ctx.strokeStyle = 'rgba(0,0,0,0.08)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(hx, hy, 18, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Info text on right portion
            const tx = 750;

            // Name
            ctx.fillStyle = '#1a1a1a';
            ctx.font = 'bold 42px system-ui, sans-serif';
            ctx.fillText(info.name, tx, 70);

            // Separator
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(tx, 85);
            ctx.lineTo(tx + 600, 85);
            ctx.stroke();

            // Date & time
            ctx.font = '24px system-ui, sans-serif';
            ctx.fillStyle = '#444';
            ctx.fillText(info.date + '   ' + info.time, tx, 118);

            // Weight & gender
            ctx.fillText('Weight: ' + info.weight + '      Gender: ' + info.gender, tx, 152);

            // ID
            ctx.font = '18px monospace';
            ctx.fillStyle = '#888';
            ctx.fillText('ID: ' + info.id, tx, 188);

            // Barcode
            for (let i = 0; i < 45; i++) {
                const w = Math.random() > 0.5 ? 2.5 : 1;
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(tx + i * 6, 198, w, 30);
            }

            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = THREE.ClampToEdgeWrapping;
            tex.wrapT = THREE.ClampToEdgeWrapping;
            return tex;
        }

        // --- Band geometry: flat with gentle droop ---
        const bandLength = 5.0;
        const bandWidth = 0.5;
        const bandThick = 0.014;
        const segments = 80;

        const bandPoints = [];
        for (let i = 0; i <= segments; i++) {
            const t = i / segments;
            const x = (t - 0.5) * bandLength;
            const droop = 0.12 * (Math.cosh((t - 0.5) * 2.5) - 1) / (Math.cosh(1.25) - 1);
            bandPoints.push(new THREE.Vector3(x, -droop, 0));
        }
        const bandCurve = new THREE.CatmullRomCurve3(bandPoints, false);

        const bandShape = new THREE.Shape();
        const hw = bandWidth / 2;
        const ht = bandThick / 2;
        bandShape.moveTo(-hw, -ht);
        bandShape.lineTo(hw, -ht);
        bandShape.lineTo(hw, ht);
        bandShape.lineTo(-hw, ht);
        bandShape.lineTo(-hw, -ht);

        const bandGeo = new THREE.ExtrudeGeometry(bandShape, {
            steps: segments * 2,
            bevelEnabled: false,
            extrudePath: bandCurve,
        });

        let bandTexture = createBandTexture(babyInfo, currentColor);

        const bandMat = new THREE.MeshPhysicalMaterial({
            map: bandTexture,
            color: 0xffffff,
            roughness: 0.35,
            metalness: 0.0,
            clearcoat: 0.5,
            clearcoatRoughness: 0.15,
            transmission: 0.06,
            thickness: 0.3,
            transparent: true,
            opacity: 0.9,
            side: THREE.DoubleSide,
        });

        const band = new THREE.Mesh(bandGeo, bandMat);
        band.rotation.x = 0.15;
        band.rotation.z = -0.05;
        scene.add(band);

        // --- Clasp at right end ---
        const claspGeo = new THREE.BoxGeometry(0.15, 0.25, bandThick * 2);
        const claspMat = new THREE.MeshPhysicalMaterial({
            color: 0xf0ebe4,
            roughness: 0.25,
            metalness: 0.05,
            clearcoat: 0.3,
        });
        const endPt = bandCurve.getPoint(1);
        const clasp = new THREE.Mesh(claspGeo, claspMat);
        clasp.position.set(endPt.x + 0.1, endPt.y, 0);
        clasp.rotation.x = 0.15;
        clasp.rotation.z = -0.05;
        scene.add(clasp);

        // Snap button
        const snapGeo = new THREE.CylinderGeometry(0.035, 0.04, 0.012, 16);
        const snapMat = new THREE.MeshPhysicalMaterial({ color: 0xfafafa, roughness: 0.15, metalness: 0.1 });
        const snap = new THREE.Mesh(snapGeo, snapMat);
        snap.rotation.x = Math.PI / 2;
        snap.position.z = bandThick * 1.5;
        clasp.add(snap);

        // --- Color picker ---
        window.setColor = function(btn) {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentColor = btn.dataset.color;
            bandTexture = createBandTexture(babyInfo, currentColor);
            bandMat.map = bandTexture;
            bandMat.needsUpdate = true;
        };

        // --- Animation ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        let idleTimer;
        canvas.addEventListener('pointerdown', () => {
            controls.autoRotate = false;
            clearTimeout(idleTimer);
        });
        canvas.addEventListener('pointerup', () => {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => { controls.autoRotate = true; }, 3000);
        });
    </script>
</body>
</html>
