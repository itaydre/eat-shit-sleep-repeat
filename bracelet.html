<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baby Bracelet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #FAF6F1; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #colors {
            position: fixed; bottom: 60px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 12px;
        }
        .color-btn {
            width: 36px; height: 36px; border-radius: 50%;
            border: 3px solid transparent; cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .color-btn.active { border-color: #5a4a3a; transform: scale(1.15); }
        #info {
            position: fixed; bottom: 24px; left: 0; right: 0;
            text-align: center; font-size: 13px; color: #9A8A7A;
            pointer-events: none; font-family: system-ui, sans-serif;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="colors">
        <button class="color-btn active" data-bg="#dce0ee" style="background:#dce0ee;" onclick="setColor(this)"></button>
        <button class="color-btn" data-bg="#d4e6f1" style="background:#d4e6f1;" onclick="setColor(this)"></button>
        <button class="color-btn" data-bg="#f5d5d5" style="background:#f5d5d5;" onclick="setColor(this)"></button>
        <button class="color-btn" data-bg="#d5f5d5" style="background:#d5f5d5;" onclick="setColor(this)"></button>
        <button class="color-btn" data-bg="#f0e4f5" style="background:#f0e4f5;" onclick="setColor(this)"></button>
    </div>
    <div id="info">Drag to rotate</div>

    <script type="importmap">
    { "imports": { "three": "https://esm.sh/three@0.171.0", "three/addons/": "https://esm.sh/three@0.171.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const babyInfo = {
            name: 'Baby Dreyfus',
            date: 'March 14, 2026',
            time: '10:30 AM',
            weight: '3,200g',
            gender: 'Boy',
            id: '24502293-1'
        };

        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0.8, 2.2);

        const controls = new OrbitControls(camera, canvas);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.5;
        controls.target.set(0, 0, 0);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const key = new THREE.DirectionalLight(0xfff8ee, 1.2);
        key.position.set(3, 5, 4);
        scene.add(key);
        const fill = new THREE.DirectionalLight(0xe8eeff, 0.4);
        fill.position.set(-3, 2, -2);
        scene.add(fill);

        // --- Texture: wraps around the torus ring (U = around loop, V = around tube cross-section) ---
        function createBandTexture(info, bgColor) {
            const c = document.createElement('canvas');
            // U goes around the bracelet loop. V goes around the tube cross-section.
            // We want a flat band look, so the "outside face" is V ~ 0.25 (outer edge of torus)
            // We paint everything on a 2048x512 canvas
            const W = 2048, H = 512;
            c.width = W; c.height = H;
            const ctx = c.getContext('2d');

            // Background — the band color
            ctx.fillStyle = bgColor || '#dce0ee';
            ctx.fillRect(0, 0, W, H);

            // Grain
            for (let i = 0; i < 4000; i++) {
                ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.03})`;
                ctx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
            }
            for (let i = 0; i < 2000; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.02})`;
                ctx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
            }

            // The "visible" area on the outside of the torus is roughly V center (H/2 area)
            // U wraps around the loop. Let's put holes at U 0.05-0.25 and label at U 0.4-0.8
            const midV = H / 2;

            // --- Holes (U: 5%-25%) ---
            for (let i = 0; i < 7; i++) {
                const hx = W * 0.05 + i * (W * 0.03);
                const hy = midV;
                ctx.save();
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(hx, hy, 22, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                ctx.strokeStyle = 'rgba(0,0,0,0.06)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(hx, hy, 22, 0, Math.PI * 2);
                ctx.stroke();
            }

            // --- Snap dot (U: ~0.28) ---
            const snapX = W * 0.28;
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.beginPath();
            ctx.arc(snapX, midV, 16, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.05)';
            ctx.beginPath();
            ctx.arc(snapX, midV, 16, 0, Math.PI * 2);
            ctx.stroke();

            // --- Label sticker (U: 45%-85%) ---
            const labelX = W * 0.45;
            const labelW = W * 0.38;
            const labelH = H * 0.55;
            const labelY = midV - labelH / 2;
            const r = 6;

            ctx.fillStyle = '#f0e6c8';
            ctx.beginPath();
            ctx.moveTo(labelX + r, labelY);
            ctx.lineTo(labelX + labelW - r, labelY);
            ctx.arcTo(labelX + labelW, labelY, labelX + labelW, labelY + r, r);
            ctx.lineTo(labelX + labelW, labelY + labelH - r);
            ctx.arcTo(labelX + labelW, labelY + labelH, labelX + labelW - r, labelY + labelH, r);
            ctx.lineTo(labelX + r, labelY + labelH);
            ctx.arcTo(labelX, labelY + labelH, labelX, labelY + labelH - r, r);
            ctx.lineTo(labelX, labelY + r);
            ctx.arcTo(labelX, labelY, labelX + r, labelY, r);
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.04)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Form lines
            const lx = labelX + 14;
            const lw = labelW - 28;
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 1; i <= 4; i++) {
                ctx.beginPath();
                ctx.moveTo(lx, labelY + labelH * (i / 5));
                ctx.lineTo(lx + lw, labelY + labelH * (i / 5));
                ctx.stroke();
            }

            // Text
            const tx = lx + 4;
            let ty = labelY + 32;

            ctx.fillStyle = '#2a2016';
            ctx.font = 'bold 26px system-ui, sans-serif';
            ctx.fillText(info.name, tx, ty);
            ty += 30;

            ctx.font = '16px system-ui, sans-serif';
            ctx.fillStyle = '#4a3a2a';
            ctx.fillText(info.date + '  ' + info.time, tx, ty);
            ty += 22;
            ctx.fillText('Weight: ' + info.weight + '  Gender: ' + info.gender, tx, ty);
            ty += 24;

            ctx.font = '13px monospace';
            ctx.fillStyle = '#6a5a4a';
            ctx.fillText('ID: ' + info.id, tx, ty);
            ty += 6;

            // Barcode
            for (let i = 0; i < 35; i++) {
                const w = Math.random() > 0.5 ? 2.5 : 1;
                ctx.fillStyle = '#2a2016';
                ctx.fillRect(tx + i * 5, ty + 4, w, 18);
            }

            return new THREE.CanvasTexture(c);
        }

        // --- Bracelet: Torus squashed into an oval ---
        // TorusGeometry(radius, tube, radialSegments, tubularSegments)
        // radius = distance from center to tube center
        // tube = radius of the tube cross-section
        const torusGeo = new THREE.TorusGeometry(0.55, 0.04, 4, 200);

        // Squash into oval by scaling X (wider) and Z (narrower)
        const pos = torusGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            pos.setX(i, pos.getX(i) * 1.4); // wider
            pos.setZ(i, pos.getZ(i) * 0.75); // narrower
            // Flatten the tube cross-section to make it band-like (not round)
            pos.setY(i, pos.getY(i) * 0.3);
        }
        torusGeo.computeVertexNormals();

        let currentBg = '#dce0ee';
        let bandTexture = createBandTexture(babyInfo, currentBg);

        const bandMat = new THREE.MeshPhysicalMaterial({
            map: bandTexture,
            color: 0xffffff,
            roughness: 0.3,
            metalness: 0.0,
            clearcoat: 0.6,
            clearcoatRoughness: 0.1,
            transparent: true,
            alphaTest: 0.3,
            transmission: 0.1,
            thickness: 0.15,
            side: THREE.DoubleSide,
        });

        const band = new THREE.Mesh(torusGeo, bandMat);
        band.rotation.x = 0.3; // Tilt slightly
        scene.add(band);

        // --- Color picker ---
        window.setColor = function(btn) {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentBg = btn.dataset.bg;
            bandTexture = createBandTexture(babyInfo, currentBg);
            bandMat.map = bandTexture;
            bandMat.map.needsUpdate = true;
        };

        // --- Animate ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        let idleTimer;
        canvas.addEventListener('pointerdown', () => {
            controls.autoRotate = false;
            clearTimeout(idleTimer);
        });
        canvas.addEventListener('pointerup', () => {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => { controls.autoRotate = true; }, 3000);
        });
    </script>
</body>
</html>
