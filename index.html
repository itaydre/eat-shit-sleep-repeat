<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eat shit sleep repeat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#5a4a3a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: inherit;
        }

        body {
            font-family: 'Varela Round', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fef9f0;
            color: #333;
            min-height: 100vh;
            padding: 20px 20px 80px;
        }

        /* --- Auth & Onboarding Screens --- */
        .auth-screen, .onboarding-screen {
            display: none;
            max-width: 400px;
            margin: 80px auto;
            text-align: center;
            padding: 20px;
        }

        .auth-screen h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .auth-screen h2, .onboarding-screen h2 {
            color: #5a4a3a;
            margin-bottom: 8px;
        }

        .auth-screen p, .onboarding-screen p {
            color: #888;
            margin-bottom: 24px;
        }

        .auth-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 12px;
            font-family: inherit;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: #5a4a3a;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-message {
            margin-top: 16px;
            color: #888;
            font-size: 0.9rem;
        }

        .onboarding-screen label {
            display: block;
            text-align: left;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 4px;
        }

        /* --- Top Bar --- */
        .top-bar {
            display: grid;
            grid-template-columns: 40px 1fr 40px;
            align-items: center;
            max-width: 500px;
            margin: 0 auto 20px;
        }

        .top-bar h1 {
            font-size: 1.1rem;
            color: #5a4a3a;
            margin: 0;
            text-align: center;
        }

        .top-bar .back-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #999;
            padding: 4px;
            visibility: hidden;
        }

        .top-bar .back-btn.visible {
            visibility: visible;
        }

        .top-bar .settings-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            padding: 4px;
            text-align: right;
        }

        /* --- Settings --- */
        .settings-page {
            display: none;
            max-width: 500px;
            margin: 0 auto;
        }

        .settings-page.active {
            display: block;
        }

        .settings-page h2 {
            font-size: 1.2rem;
            color: #5a4a3a;
            margin-bottom: 20px;
        }

        .settings-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: white;
            border-radius: 12px;
            margin-bottom: 8px;
            box-shadow: none;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 0.95rem;
            color: #333;
            font-family: inherit;
            text-align: left;
        }

        .settings-item:active {
            transform: scale(0.98);
        }

        .settings-item .settings-icon {
            font-size: 1.3rem;
        }

        .settings-item.danger {
            color: #e74c3c;
        }

        /* --- Main App --- */
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 32px;
            flex-wrap: nowrap;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            border: none;
            border-radius: 16px;
            padding: 14px 0;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: none;
            flex: 1;
            min-width: 0;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn .emoji {
            font-size: 1.8rem;
        }

        .btn-sleep {
            background: #d4e6ff;
            color: #2a5298;
        }

        .btn-poop {
            background: #f5e6d0;
            color: #7a5c2e;
        }

        .btn-feed {
            background: #d9f5d9;
            color: #2e6b2e;
        }

        .history {
            max-width: 500px;
            margin: 0 auto;
        }

        .history h2 {
            font-size: 1.2rem;
            color: #5a4a3a;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: #999;
            padding: 4px 8px;
            line-height: 1;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 24px;
            width: 300px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .modal h3 {
            margin-bottom: 16px;
            color: #5a4a3a;
        }

        .modal label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 4px;
        }

        .modal select, .modal input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 14px;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .modal-buttons .cancel {
            background: #eee;
            color: #666;
        }

        .modal-buttons .save {
            background: #4caf50;
            color: white;
        }

        .loader {
            display: flex;
            justify-content: center;
            padding: 40px 0;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #e0d6c8;
            border-top-color: #5a4a3a;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .entry {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: white;
            border-radius: 12px;
            margin-bottom: 8px;
            box-shadow: none;
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .entry .emoji {
            font-size: 1.5rem;
        }

        .entry .details {
            flex: 1;
        }

        .entry .activity {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .entry .time {
            color: #888;
            font-size: 0.85rem;
        }

        .entry .delete-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
        }

        .entry .delete-btn:hover {
            color: #e74c3c;
        }

        .empty {
            text-align: center;
            color: #bbb;
            padding: 40px 0;
            font-size: 0.95rem;
        }

        .day-label {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 16px 0 0;
            padding-left: 4px;
        }

        .day-summary {
            display: flex;
            gap: 12px;
            padding: 6px 4px 8px;
            font-size: 0.8rem;
            color: #aaa;
        }

        .day-summary span {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .feed-timer-wrapper {
            max-width: 500px;
            margin: 0 auto 16px;
        }

        .feed-timer {
            max-width: 500px;
            margin: 0 auto;
            background: #fff3e0;
            border-radius: 14px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: none;
        }

        .feed-timer .emoji {
            font-size: 1.6rem;
        }

        .feed-timer .info {
            flex: 1;
        }

        .feed-timer .label {
            font-size: 0.8rem;
            color: #b07a30;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .feed-timer .countdown {
            font-size: 1.3rem;
            font-weight: 700;
            color: #7a5c2e;
            font-variant-numeric: tabular-nums;
        }

        .feed-timer .skip-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            color: #b07a30;
            cursor: pointer;
            padding: 4px 8px;
            opacity: 0.6;
        }

        .feed-timer.overdue .skip-btn {
            color: #c0392b;
        }

        .feed-timer.overdue {
            background: #fde8e8;
        }

        .feed-timer.overdue .label {
            color: #c0392b;
        }

        .feed-timer.overdue .countdown {
            color: #e74c3c;
        }

        .notif-banner {
            max-width: 500px;
            margin: 0 auto 16px;
            background: #fff3cd;
            border-radius: 10px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: #856404;
        }

        .notif-banner button {
            background: #5a4a3a;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* --- Bottom Nav Bar --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 10px 24px calc(10px + env(safe-area-inset-bottom, 0px));
            background: #fff;
            border-top: 1px solid #ebe3d8;
            z-index: 50;
        }
        .nav-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 12px;
            font-family: inherit;
        }
        .nav-tab .nav-icon {
            width: 22px;
            height: 22px;
            stroke: #b0a090;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .nav-tab .nav-label {
            font-size: 0.68rem;
            font-weight: 500;
            color: #b0a090;
        }
        .nav-tab.active .nav-icon {
            stroke: #c7855c;
        }
        .nav-tab.active .nav-label {
            font-weight: 700;
            color: #c7855c;
        }

        .stats {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 14px;
            padding: 16px 20px;
            box-shadow: none;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 36px repeat(7, 1fr);
            gap: 4px 6px;
            align-items: end;
        }
        .stats-row-label {
            font-size: 1.2rem;
            text-align: center;
            padding-bottom: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }
        .stats-row-label small {
            font-size: 0.55rem;
            color: #aaa;
        }
        .stats-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-height: 60px;
            justify-content: flex-end;
        }
        .stats-count {
            font-size: 0.7rem;
            color: #999;
            font-weight: 600;
        }
        .stats-bar {
            width: 100%;
            max-width: 28px;
            border-radius: 4px 4px 0 0;
            min-height: 0;
        }
        .stats-bar.pee { background: #a8d4f0; }
        .stats-bar.poop { background: #d4b896; }
        .stats-bar.feed { background: #a3d9a3; }
        .stats-day-label {
            font-size: 0.65rem;
            color: #aaa;
            text-align: center;
            padding-top: 4px;
        }
        .stats-corner { }

        .time-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }
        .preset-btn {
            flex: 1;
            min-width: 60px;
            padding: 10px 8px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: #f9f9f9;
            font-size: 0.85rem;
            cursor: pointer;
            text-align: center;
            color: #333;
            font-family: inherit;
        }
        .preset-btn.active {
            background: #5a4a3a;
            color: white;
            border-color: #5a4a3a;
        }
        .preset-other {
            background: none;
            color: #999;
        }

    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" style="display:flex; justify-content:center; padding-top:120px;">
        <div class="spinner"></div>
    </div>

    <!-- Auth Screen -->
    <div class="auth-screen" id="auth-screen">
        <h2>Eat shit sleep repeat</h2>
        <p>Track your baby's feeds, diapers, and more.</p>
        <button class="auth-btn" onclick="signInWithGoogle()" style="background:#fff; color:#333; border:1px solid #ddd; margin-bottom:12px; display:flex; align-items:center; justify-content:center; gap:8px;">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Continue with Google
        </button>
        <div style="color:#aaa; font-size:0.85rem; margin-bottom:12px;">or</div>
        <input type="email" id="auth-email" class="auth-input" placeholder="Your email">
        <button id="auth-submit" class="auth-btn" onclick="sendMagicLink()">Send magic link</button>
        <p class="auth-message" id="auth-message"></p>
    </div>

    <!-- Onboarding Screen -->
    <div class="onboarding-screen" id="onboarding-screen">
        <h2>Welcome!</h2>
        <p>Tell us about your baby</p>
        <label>Baby's name</label>
        <input type="text" id="baby-name" class="auth-input" placeholder="e.g. Maya">
        <label>Date of birth</label>
        <input type="date" id="baby-dob" class="auth-input">
        <label>Invite code (optional — to join a partner's account)</label>
        <input type="text" id="invite-code" class="auth-input" placeholder="Paste invite code">
        <button class="auth-btn" onclick="saveOnboarding()">Let's go!</button>
    </div>

    <!-- Main App -->
    <div id="main-app" style="display:none">
        <div class="top-bar">
            <button class="back-btn" id="back-btn" onclick="openSettings()">&#8592;</button>
            <h1 id="app-title">Eat shit sleep repeat</h1>
            <button class="settings-btn" id="settings-btn" onclick="openSettings()">&#9881;</button>
        </div>

        <div class="settings-page" id="settings-page">
            <h2>Settings</h2>
            <button class="settings-item" onclick="copyInviteCode()">
                <span class="settings-icon">&#128101;</span>
                <span id="invite-btn-text">Copy invite code for partner</span>
            </button>
            <button class="settings-item" onclick="downloadBackup()">
                <span class="settings-icon">&#128190;</span>
                <span>Download backup</span>
            </button>
            <button class="settings-item danger" onclick="confirmClearAll()">
                <span class="settings-icon">&#128465;&#65039;</span>
                <span>Clear all data</span>
            </button>
            <button class="settings-item" onclick="logout()">
                <span class="settings-icon">&#128682;</span>
                <span>Sign out</span>
            </button>
        </div>

        <div id="main-content">
            <!-- TODAY TAB -->
            <div class="tab-content active" id="tab-today">
                <div class="buttons">
                    <button class="btn btn-sleep" onclick="log('pee')">
                        <span class="emoji">&#128166;</span>
                        <span>Pee</span>
                    </button>
                    <button class="btn btn-poop" onclick="log('poop')">
                        <span class="emoji">&#128169;</span>
                        <span>Poop</span>
                    </button>
                    <button class="btn btn-feed" onclick="log('feed_l')">
                        <span class="emoji" style="display:inline-block;transform:scaleX(-1)">&#127868;</span>
                        <span>Feed L</span>
                    </button>
                    <button class="btn btn-feed" onclick="log('feed_r')">
                        <span class="emoji">&#127868;</span>
                        <span>Feed R</span>
                    </button>
                </div>

                <div id="notif-banner" class="notif-banner" style="display:none">
                    <span>Enable notifications to get feeding reminders</span>
                    <button onclick="requestNotifPermission()">Enable</button>
                </div>

                <div class="feed-timer-wrapper" id="feed-timer-wrapper" style="display:none">
                    <div id="feed-timer" class="feed-timer">
                        <span class="emoji">&#127868;</span>
                        <div class="info">
                            <div class="label">Next feeding in</div>
                            <div class="countdown" id="countdown">--:--</div>
                        </div>
                        <button class="skip-btn" onclick="skipNextReminder()" title="Skip next reminder">&#10005;</button>
                    </div>
                    <div id="restore-timer" style="display:none; text-align:center; padding-top:8px;">
                        <button onclick="restoreTimer()" style="background:none; border:1px solid #ddd; border-radius:8px; padding:6px 14px; font-size:0.8rem; color:#999; cursor:pointer; font-family:inherit;">Show feed timer</button>
                    </div>
                </div>

                <div class="history">
                    <h2>
                        Today
                        <button class="add-btn" onclick="openAddModal()">+</button>
                    </h2>
                    <div id="today-entries"></div>
                </div>
            </div>

            <!-- HISTORY TAB -->
            <div class="tab-content" id="tab-history">
                <div class="history">
                    <h2>
                        History
                        <button class="add-btn" onclick="openAddModal()">+</button>
                    </h2>
                    <div id="entries"><div class="loader" id="loader"><div class="spinner"></div></div></div>
                </div>
            </div>

            <!-- STATS TAB -->
            <div class="tab-content" id="tab-stats">
                <div class="stats" id="stats">
                    <div id="stats-grid" class="stats-grid"></div>
                </div>
            </div>
        </div>

        <!-- Bottom Nav Bar -->
        <nav class="bottom-nav" id="bottom-nav">
            <button class="nav-tab active" onclick="switchTab('today')">
                <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span class="nav-label">Today</span>
            </button>
            <button class="nav-tab" onclick="switchTab('history')">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12h4l3-9 4 18 3-9h4"/></svg>
                <span class="nav-label">History</span>
            </button>
            <button class="nav-tab" onclick="switchTab('stats')">
                <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span class="nav-label">Stats</span>
            </button>
        </nav>
    </div>

    <div class="modal-overlay" id="add-modal">
        <div class="modal">
            <h3>Add past entry</h3>
            <label>Activity</label>
            <select id="add-type">
                <option value="pee">&#128166; Pee</option>
                <option value="poop">&#128169; Poop</option>
                <option value="feed_l">&#127868; Feed L</option>
                <option value="feed_r">&#127868; Feed R</option>
            </select>
            <label>When</label>
            <div class="time-presets">
                <button type="button" class="preset-btn" onclick="setTimePreset(5)">5m ago</button>
                <button type="button" class="preset-btn" onclick="setTimePreset(15)">15m ago</button>
                <button type="button" class="preset-btn" onclick="setTimePreset(30)">30m ago</button>
                <button type="button" class="preset-btn" onclick="setTimePreset(60)">1h ago</button>
                <button type="button" class="preset-btn" onclick="setTimePreset(120)">2h ago</button>
                <button type="button" class="preset-btn preset-other" onclick="toggleCustomTime()">Other</button>
            </div>
            <input type="datetime-local" id="add-datetime" style="display:none">
            <div class="modal-buttons">
                <button class="cancel" onclick="closeAddModal()">Cancel</button>
                <button class="save" onclick="saveRetroEntry()">Save</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        import { WebHaptics } from 'https://esm.sh/web-haptics@0.0.6';
        const haptics = new WebHaptics({ debug: true });
        window.hapticSuccess = () => haptics.trigger('success');
        window.hapticError = () => haptics.trigger('error');

        // --- Supabase Auth ---
        let sb = null;
        let session = null;
        let profile = null;

        async function initSupabase() {
            const res = await fetch('/api/config');
            const { supabaseUrl, supabaseAnonKey } = await res.json();
            sb = createClient(supabaseUrl, supabaseAnonKey);

            const { data: { session: existing } } = await sb.auth.getSession();
            session = existing;

            if (session) {
                await loadApp();
            } else {
                showScreen('auth');
            }

            sb.auth.onAuthStateChange((event, sess) => {
                if (event === 'INITIAL_SESSION' || event === 'TOKEN_REFRESHED') return;
                session = sess;
                if (event === 'SIGNED_IN') {
                    loadApp();
                } else if (event === 'SIGNED_OUT') {
                    showScreen('auth');
                }
            });
        }

        function authHeaders() {
            if (!session) return {};
            return { 'Authorization': 'Bearer ' + session.access_token };
        }

        function apiFetch(url, options = {}) {
            options.headers = { ...authHeaders(), ...(options.headers || {}) };
            return fetch(url, options);
        }

        function showScreen(screen) {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = screen === 'auth' ? 'block' : 'none';
            document.getElementById('onboarding-screen').style.display = screen === 'onboarding' ? 'block' : 'none';
            document.getElementById('main-app').style.display = screen === 'app' ? 'block' : 'none';
        }

        async function signInWithGoogle() {
            const { error } = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
            if (error) console.error('Google sign in error:', error);
        }

        async function sendMagicLink() {
            const email = document.getElementById('auth-email').value.trim();
            if (!email) return;
            const btn = document.getElementById('auth-submit');
            btn.disabled = true;
            const { error } = await sb.auth.signInWithOtp({ email });
            btn.disabled = false;
            const msgEl = document.getElementById('auth-message');
            if (error) {
                msgEl.style.color = '#c0392b';
                msgEl.textContent = error.status === 429
                    ? 'Too many attempts. Please wait a minute and try again.'
                    : 'Something went wrong. Try again.';
            } else {
                msgEl.style.color = '#2e6b2e';
                msgEl.textContent = 'Check your email for the magic link!';
            }
        }

        async function saveOnboarding() {
            const baby_name = document.getElementById('baby-name').value.trim();
            const baby_birthdate = document.getElementById('baby-dob').value;
            const invite_code = document.getElementById('invite-code').value.trim();
            if (!baby_name) return;
            const res = await apiFetch('/api/profile', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ baby_name, baby_birthdate: baby_birthdate || null, invite_code: invite_code || null }),
            });
            profile = await res.json();
            startApp();
        }

        let appLoading = false;
        async function loadApp() {
            if (appLoading) return;
            appLoading = true;
            try {
                const res = await apiFetch('/api/profile');
                if (!res.ok) {
                    showScreen('onboarding');
                    return;
                }
                profile = await res.json();

                if (!profile || !profile.onboarding_done) {
                    showScreen('onboarding');
                    return;
                }

                startApp();
            } catch (e) {
                console.warn('Failed to load profile:', e);
                showScreen('onboarding');
            } finally {
                appLoading = false;
            }
        }

        function startApp() {
            showScreen('app');
            const titleEl = document.getElementById('app-title');
            if (profile && profile.baby_name) {
                titleEl.textContent = profile.baby_name + "'s log";
            }
            initServiceWorker().then(() => {
                checkNotifPermission();
                if (Notification.permission === 'granted') {
                    subscribeToPush();
                }
            });
            migrateLocalStorage().then(() => fetchEntries()).then(() => updateFeedTimer());
            if (!window._intervalsStarted) {
                setInterval(() => {
                    if (session) fetchEntries().then(() => updateFeedTimer());
                }, 30000);
                setInterval(() => {
                    if (session) updateFeedTimer();
                }, 10000);
                window._intervalsStarted = true;
            }
        }

        async function logout() {
            await sb.auth.signOut();
            session = null;
            profile = null;
            entries = [];
            showScreen('auth');
        }

        // --- Add Entry Modal ---
        function toLocalISOString(date) {
            const offset = date.getTimezoneOffset();
            const local = new Date(date.getTime() - offset * 60000);
            return local.toISOString().slice(0, 16);
        }

        let selectedPresetMinutes = 5;

        function openAddModal() {
            selectedPresetMinutes = 5;
            document.getElementById('add-datetime').style.display = 'none';
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.preset-btn').classList.add('active');
            const dtInput = document.getElementById('add-datetime');
            dtInput.max = toLocalISOString(new Date());
            document.getElementById('add-modal').classList.add('open');
        }

        function closeAddModal() {
            document.getElementById('add-modal').classList.remove('open');
        }

        function setTimePreset(minutes) {
            selectedPresetMinutes = minutes;
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('add-datetime').style.display = 'none';
        }

        function toggleCustomTime() {
            selectedPresetMinutes = null;
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const dtInput = document.getElementById('add-datetime');
            dtInput.value = toLocalISOString(new Date());
            dtInput.style.display = 'block';
        }

        async function saveRetroEntry() {
            const type = document.getElementById('add-type').value;
            let timestamp;
            if (selectedPresetMinutes !== null) {
                timestamp = Date.now() - selectedPresetMinutes * 60000;
            } else {
                const datetime = document.getElementById('add-datetime').value;
                if (!datetime) return;
                timestamp = new Date(datetime).getTime();
                if (timestamp > Date.now()) return;
            }
            closeAddModal();
            await log(type, timestamp);
        }

        function switchTab(tab) {
            ['today', 'history', 'stats'].forEach(t => {
                const el = document.getElementById('tab-' + t);
                if (el) el.classList.toggle('active', t === tab);
            });
            document.querySelectorAll('.nav-tab').forEach(btn => {
                const label = btn.querySelector('.nav-label').textContent.toLowerCase();
                btn.classList.toggle('active', label === tab);
            });
        }

        // --- Settings ---
        let settingsOpen = false;
        function openSettings() {
            settingsOpen = !settingsOpen;
            document.getElementById('settings-page').classList.toggle('active', settingsOpen);
            document.getElementById('main-content').style.display = settingsOpen ? 'none' : '';
            document.getElementById('bottom-nav').style.display = settingsOpen ? 'none' : '';
            const ftw = document.getElementById('feed-timer-wrapper');
            if (settingsOpen) ftw.style.display = 'none';
            document.getElementById('back-btn').classList.toggle('visible', settingsOpen);
            document.getElementById('settings-btn').style.visibility = settingsOpen ? 'hidden' : '';
        }

        async function copyInviteCode() {
            if (profile && profile.household_id) {
                await navigator.clipboard.writeText(profile.household_id);
                document.getElementById('invite-btn-text').textContent = 'Copied!';
                setTimeout(() => {
                    document.getElementById('invite-btn-text').textContent = 'Copy invite code for partner';
                }, 2000);
            }
        }

        function confirmClearAll() {
            if (confirm('Are you sure you want to clear all data? This cannot be undone.')) {
                clearAll();
            }
        }

        // --- Data ---
        const ACTIVITIES = {
            pee:    { emoji: '\u{1F4A6}', label: 'Pee' },
            poop:   { emoji: '\u{1F4A9}', label: 'Poop' },
            feed:   { emoji: '\u{1F37C}', label: 'Feed' },
            feed_l: { emoji: '\u{1F37C}', label: 'Feed L', flip: true },
            feed_r: { emoji: '\u{1F37C}', label: 'Feed R' },
        };

        let entries = [];

        function getEntries() {
            return entries;
        }

        async function fetchEntries() {
            try {
                const res = await apiFetch('/api/logs');
                entries = await res.json();
            } catch (e) {
                console.warn('Failed to fetch logs:', e);
            }
            render();
        }

        async function log(type, customTimestamp) {
            hapticSuccess();
            const timestamp = customTimestamp || Date.now();
            try {
                const res = await apiFetch('/api/logs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, timestamp }),
                });
                const saved = await res.json();
                entries.push(saved);
                entries.sort((a, b) => b.timestamp - a.timestamp);
            } catch (e) {
                entries.unshift({ type, timestamp });
                console.warn('Failed to save log:', e);
            }
            render();

            if (type === 'feed' || type === 'feed_l' || type === 'feed_r') {
                updateFeedTimer();
                const endpoint = localStorage.getItem('pushEndpoint');
                if (endpoint) {
                    apiFetch('/api/feed', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ endpoint, timestamp }),
                    }).catch(() => {});
                }
            }
        }

        async function deleteEntry(index) {
            hapticError();
            const entry = entries[index];
            entries.splice(index, 1);
            render();

            if (entry && entry.id) {
                try {
                    await apiFetch('/api/logs', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: entry.id }),
                    });
                } catch (e) {
                    console.warn('Failed to delete log:', e);
                }
            }
        }

        async function clearAll() {
            for (const entry of entries) {
                if (entry.id) {
                    await apiFetch('/api/logs', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: entry.id }),
                    }).catch(() => {});
                }
            }
            entries = [];
            render();
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function formatDayLabel(ts) {
            const d = new Date(ts);
            const today = new Date();
            const yesterday = new Date();
            yesterday.setDate(today.getDate() - 1);

            if (d.toDateString() === today.toDateString()) return 'Today';
            if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
            return d.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
        }

        function render() {
            const entries = getEntries();
            const historyContainer = document.getElementById('entries');
            const todayContainer = document.getElementById('today-entries');

            if (entries.length === 0) {
                historyContainer.innerHTML = '<div class="empty">No entries yet. Tap a button above!</div>';
                if (todayContainer) todayContainer.innerHTML = '<div class="empty">No entries yet. Tap a button above!</div>';
                return;
            }

            // Group entries by day for summaries
            const dayGroups = {};
            entries.forEach(entry => {
                const dayLabel = formatDayLabel(entry.timestamp);
                if (!dayGroups[dayLabel]) dayGroups[dayLabel] = {};
                dayGroups[dayLabel][entry.type] = (dayGroups[dayLabel][entry.type] || 0) + 1;
            });

            // Render full history (all days)
            let html = '';
            let currentDay = '';

            entries.forEach((entry, i) => {
                const dayLabel = formatDayLabel(entry.timestamp);
                if (dayLabel !== currentDay) {
                    currentDay = dayLabel;
                    html += `<div class="day-label">${dayLabel}</div>`;
                    const counts = dayGroups[dayLabel];
                    const parts = [];
                    if (counts.pee) parts.push(`<span>\u{1F4A6} ${counts.pee}</span>`);
                    if (counts.poop) parts.push(`<span>\u{1F4A9} ${counts.poop}</span>`);
                    if (counts.feed_l) parts.push(`<span><span style="display:inline-block;transform:scaleX(-1)">\u{1F37C}</span> ${counts.feed_l}</span>`);
                    if (counts.feed_r) parts.push(`<span>\u{1F37C} ${counts.feed_r}</span>`);
                    if (parts.length) html += `<div class="day-summary">${parts.join('')}</div>`;
                }

                const act = ACTIVITIES[entry.type] || { emoji: '\u2753', label: entry.type };
                const flipStyle = act.flip ? ' style="display:inline-block;transform:scaleX(-1)"' : '';
                html += `
                    <div class="entry">
                        <span class="emoji"${flipStyle}>${act.emoji}</span>
                        <div class="details">
                            <div class="activity">${act.label}</div>
                            <div class="time">${formatTime(entry.timestamp)}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteEntry(${i})">&times;</button>
                    </div>
                `;
            });

            historyContainer.innerHTML = html;

            // Render today-only entries
            if (todayContainer) {
                const today = new Date();
                const todayEntries = entries.filter(e => {
                    const d = new Date(e.timestamp);
                    return d.toDateString() === today.toDateString();
                });

                if (todayEntries.length === 0) {
                    todayContainer.innerHTML = '<div class="empty">No entries today yet.</div>';
                } else {
                    // Day summary for today
                    const todayCounts = dayGroups['Today'] || {};
                    const parts = [];
                    if (todayCounts.pee) parts.push(`<span>\u{1F4A6} ${todayCounts.pee}</span>`);
                    if (todayCounts.poop) parts.push(`<span>\u{1F4A9} ${todayCounts.poop}</span>`);
                    if (todayCounts.feed_l) parts.push(`<span><span style="display:inline-block;transform:scaleX(-1)">\u{1F37C}</span> ${todayCounts.feed_l}</span>`);
                    if (todayCounts.feed_r) parts.push(`<span>\u{1F37C} ${todayCounts.feed_r}</span>`);

                    let todayHtml = '';
                    if (parts.length) todayHtml += `<div class="day-summary">${parts.join('')}</div>`;

                    todayEntries.forEach((entry) => {
                        const globalIndex = entries.indexOf(entry);
                        const act = ACTIVITIES[entry.type] || { emoji: '\u2753', label: entry.type };
                        const tFlip = act.flip ? ' style="display:inline-block;transform:scaleX(-1)"' : '';
                        todayHtml += `
                            <div class="entry">
                                <span class="emoji"${tFlip}>${act.emoji}</span>
                                <div class="details">
                                    <div class="activity">${act.label}</div>
                                    <div class="time">${formatTime(entry.timestamp)}</div>
                                </div>
                                <button class="delete-btn" onclick="deleteEntry(${globalIndex})">&times;</button>
                            </div>
                        `;
                    });

                    todayContainer.innerHTML = todayHtml;
                }
            }

            renderCharts();
        }

        // --- Stats Charts ---
        function renderCharts() {
            const allEntries = getEntries();
            const statsEl = document.getElementById('stats');
            const gridEl = document.getElementById('stats-grid');

            // Build last 7 days (today first)
            const days = [];
            for (let i = 0; i <= 6; i++) {
                const d = new Date();
                d.setHours(0, 0, 0, 0);
                d.setDate(d.getDate() - i);
                days.push(d);
            }
            days.reverse();

            const types = [
                { key: 'pee', emoji: '\u{1F4A6}', label: 'Pee', cls: 'pee' },
                { key: 'poop', emoji: '\u{1F4A9}', label: 'Poop', cls: 'poop' },
                { key: 'feed_l', emoji: '\u{1F37C}', label: 'Feed L', cls: 'feed', flip: true },
                { key: 'feed_r', emoji: '\u{1F37C}', label: 'Feed R', cls: 'feed' },
            ];

            // Count per day per type
            const counts = {};
            let max = 1;
            types.forEach(t => {
                counts[t.key] = {};
                days.forEach(d => { counts[t.key][d.getTime()] = 0; });
            });

            allEntries.forEach(e => {
                const d = new Date(e.timestamp);
                d.setHours(0, 0, 0, 0);
                const dayKey = d.getTime();
                if (counts[e.type] && counts[e.type][dayKey] !== undefined) {
                    counts[e.type][dayKey]++;
                    if (counts[e.type][dayKey] > max) max = counts[e.type][dayKey];
                }
            });

            // Check if there's any data
            let hasData = false;
            types.forEach(t => {
                days.forEach(d => { if (counts[t.key][d.getTime()] > 0) hasData = true; });
            });
            if (!hasData) { gridEl.innerHTML = '<div class="empty" style="grid-column:1/-1">No data yet</div>'; return; }

            const maxHeight = 40;
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            let html = '';

            // Day label header row
            html += '<div class="stats-corner"></div>';
            days.forEach(d => {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const label = d.getTime() === today.getTime() ? 'Today' : dayNames[d.getDay()];
                html += `<div class="stats-day-label">${label}</div>`;
            });

            // One row per activity
            types.forEach(t => {
                const sFlip = t.flip ? ' style="display:inline-block;transform:scaleX(-1)"' : '';
                html += `<div class="stats-row-label"><span${sFlip}>${t.emoji}</span><small>${t.label}</small></div>`;
                days.forEach(d => {
                    const c = counts[t.key][d.getTime()];
                    const h = c > 0 ? Math.max(4, Math.round((c / max) * maxHeight)) : 0;
                    html += `<div class="stats-cell">`;
                    if (c > 0) {
                        html += `<span class="stats-count">${c}</span>`;
                        html += `<div class="stats-bar ${t.cls}" style="height:${h}px"></div>`;
                    }
                    html += `</div>`;
                });
            });

            gridEl.innerHTML = html;
        }

        // --- Backup ---
        function downloadBackup() {
            const entries = getEntries();
            if (entries.length === 0) return alert('Nothing to backup!');
            const data = JSON.stringify(entries, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const date = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `baby-log-backup-${date}.json`;
            a.click();
            URL.revokeObjectURL(url);
            localStorage.setItem('last_backup', Date.now());
        }

        // --- Notification & Feed Reminder ---
        const FEED_INTERVAL = 2 * 60 * 60 * 1000; // 2 hours
        const VAPID_PUBLIC_KEY = 'BMN9JQe4eiEidwuJEacqzsUsunUzEZkAQasEyJLquDZ8IocDKqPdQzWzBbpkNHf0Xh6UXRf3d40TvSa7ZZHCNlE';

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const raw = atob(base64);
            const arr = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
            return arr;
        }

        async function initServiceWorker() {
            if ('serviceWorker' in navigator) {
                try {
                    await navigator.serviceWorker.register('sw.js');
                } catch (e) {
                    console.warn('SW registration failed:', e);
                }
            }
        }

        function checkNotifPermission() {
            const banner = document.getElementById('notif-banner');
            if (!('Notification' in window) || Notification.permission === 'granted') {
                banner.style.display = 'none';
            } else if (Notification.permission === 'denied') {
                banner.style.display = 'none';
            } else {
                banner.style.display = 'flex';
            }
        }

        async function subscribeToPush() {
            const reg = await navigator.serviceWorker.ready;
            let sub = await reg.pushManager.getSubscription();
            if (!sub) {
                sub = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
                });
            }
            await apiFetch('/api/subscribe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    subscription: sub.toJSON(),
                    lastFeedTime: getLastFeedTime(),
                }),
            });
            localStorage.setItem('pushEndpoint', sub.endpoint);
        }

        async function requestNotifPermission() {
            const result = await Notification.requestPermission();
            checkNotifPermission();
            if (result === 'granted') {
                await subscribeToPush();
            }
        }

        function getLastFeedTime() {
            const entries = getEntries();
            const lastFeed = entries.find(e => e.type === 'feed' || e.type === 'feed_l' || e.type === 'feed_r');
            return lastFeed ? lastFeed.timestamp : null;
        }

        async function skipNextReminder() {
            localStorage.setItem('skipReminderUntil', getLastFeedTime());
            document.getElementById('feed-timer').style.display = 'none';
            document.getElementById('restore-timer').style.display = 'block';
            document.getElementById('feed-timer-wrapper').style.display = '';
            const endpoint = localStorage.getItem('pushEndpoint');
            if (endpoint) {
                await apiFetch('/api/skip-reminder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ endpoint }),
                });
            }
        }

        function restoreTimer() {
            localStorage.removeItem('skipReminderUntil');
            document.getElementById('restore-timer').style.display = 'none';
            updateFeedTimer();
        }

        function updateFeedTimer() {
            const wrapperEl = document.getElementById('feed-timer-wrapper');
            const timerEl = document.getElementById('feed-timer');
            const countdownEl = document.getElementById('countdown');
            const lastFeed = getLastFeedTime();

            const skippedFor = localStorage.getItem('skipReminderUntil');
            if (!lastFeed || (skippedFor && Number(skippedFor) === lastFeed)) {
                timerEl.style.display = 'none';
                if (lastFeed && skippedFor) {
                    document.getElementById('restore-timer').style.display = 'block';
                    wrapperEl.style.display = '';
                } else {
                    wrapperEl.style.display = 'none';
                }
                return;
            }
            document.getElementById('restore-timer').style.display = 'none';

            wrapperEl.style.display = '';
            timerEl.style.display = 'flex';
            const nextFeedAt = lastFeed + FEED_INTERVAL;
            const diff = nextFeedAt - Date.now();

            const feedTime = new Date(nextFeedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (diff <= 0) {
                const overdue = Math.abs(diff);
                const mins = Math.floor(overdue / 60000);
                const hrs = Math.floor(mins / 60);
                const m = mins % 60;
                timerEl.classList.add('overdue');
                timerEl.querySelector('.label').textContent = `Feeding overdue (was ${feedTime})`;
                countdownEl.textContent = `${hrs}h ${String(m).padStart(2, '0')}m`;
            } else {
                const mins = Math.floor(diff / 60000);
                const hrs = Math.floor(mins / 60);
                const m = mins % 60;
                timerEl.classList.remove('overdue');
                timerEl.querySelector('.label').textContent = `Next feeding at ${feedTime}`;
                countdownEl.textContent = `${hrs}h ${String(m).padStart(2, '0')}m`;
            }
        }

        // One-time migration from localStorage to Supabase
        async function migrateLocalStorage() {
            if (localStorage.getItem('baby_log_migrated')) return;
            const old = JSON.parse(localStorage.getItem('baby_log') || '[]');
            if (old.length === 0) { localStorage.setItem('baby_log_migrated', '1'); return; }

            for (const entry of old) {
                const type = entry.type === 'feed' ? 'feed_l' : entry.type;
                await apiFetch('/api/logs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, timestamp: entry.timestamp }),
                }).catch(() => {});
            }
            localStorage.setItem('baby_log_migrated', '1');
        }

        // Expose functions for onclick handlers (module scope)
        Object.assign(window, {
            log, openAddModal, closeAddModal, saveRetroEntry, setTimePreset, toggleCustomTime, switchTab,
            openSettings, confirmClearAll, copyInviteCode, deleteEntry, downloadBackup, clearAll,
            requestNotifPermission, skipNextReminder, restoreTimer, signInWithGoogle, sendMagicLink, saveOnboarding, logout
        });

        // Boot
        initSupabase().catch(e => {
            console.error('Init failed:', e);
            const errEl = document.createElement('pre');
            errEl.style.cssText = 'padding:20px;color:red';
            errEl.textContent = e.message + '\n' + e.stack;
            document.body.prepend(errEl);
            showScreen('auth');
        });
    </script>
</body>
</html>
