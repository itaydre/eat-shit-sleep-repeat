<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baby Bracelet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #FAF6F1; overflow: hidden; touch-action: none; font-family: system-ui, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }

        #panel {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: 280px;
            background: #fff;
            box-shadow: -2px 0 16px rgba(0,0,0,0.08);
            padding: 20px;
            overflow-y: auto;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        #panel h3 {
            font-size: 15px;
            font-weight: 700;
            color: #3D3229;
            margin: 0;
        }
        .field { display: flex; flex-direction: column; gap: 4px; }
        .field label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #9A8A7A;
        }
        .field input, .field select {
            padding: 8px 10px;
            border: 1px solid #e0d8ce;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            color: #3D3229;
            outline: none;
        }
        .field input:focus, .field select:focus {
            border-color: #5a4a3a;
        }
        .color-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .color-btn {
            width: 32px; height: 32px; border-radius: 50%;
            border: 3px solid transparent; cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .color-btn.active { border-color: #5a4a3a; transform: scale(1.1); }
        .divider { height: 1px; background: #f0ebe4; }
        #info {
            position: fixed; bottom: 24px; left: 0; right: 280px;
            text-align: center; font-size: 13px; color: #9A8A7A;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <div id="panel">
        <h3>Baby Bracelet</h3>
        <div class="field">
            <label>Style</label>
            <select id="p-style" onchange="updateBracelet()">
                <option value="flat">Flat Band</option>
                <option value="curved">Oval + Label</option>
                <option value="clinical">Clinical PVC</option>
            </select>
        </div>
        <div class="divider"></div>

        <div class="field">
            <label>Name</label>
            <input type="text" id="p-name" value="Baby Dreyfus" oninput="updateBracelet()">
        </div>
        <div class="field">
            <label>Date of Birth</label>
            <input type="date" id="p-date" value="2026-03-14" oninput="updateBracelet()">
        </div>
        <div class="field">
            <label>Time of Birth</label>
            <input type="time" id="p-time" value="10:30" oninput="updateBracelet()">
        </div>
        <div class="field">
            <label>Weight</label>
            <input type="text" id="p-weight" value="3,200g" oninput="updateBracelet()">
        </div>
        <div class="field">
            <label>Gender</label>
            <select id="p-gender" onchange="updateBracelet()">
                <option value="Boy" selected>Boy</option>
                <option value="Girl">Girl</option>
            </select>
        </div>
        <div class="field">
            <label>Hospital</label>
            <input type="text" id="p-hospital" value="" placeholder="e.g. Ichilov" oninput="updateBracelet()">
        </div>

        <div class="divider"></div>

        <div class="field">
            <label>Band Color</label>
            <div class="color-row">
                <button class="color-btn active" data-color="#f5f0ea" style="background:#f5f0ea;" onclick="setColor(this)"></button>
                <button class="color-btn" data-color="#d4e6f1" style="background:#d4e6f1;" onclick="setColor(this)"></button>
                <button class="color-btn" data-color="#f5d5d5" style="background:#f5d5d5;" onclick="setColor(this)"></button>
                <button class="color-btn" data-color="#d5f5d5" style="background:#d5f5d5;" onclick="setColor(this)"></button>
                <button class="color-btn" data-color="#f0e4f5" style="background:#f0e4f5;" onclick="setColor(this)"></button>
            </div>
        </div>

        <div class="field">
            <label>Band Length</label>
            <input type="range" id="p-length" min="3" max="7" step="0.1" value="5" oninput="updateGeometry()">
        </div>
        <div class="field">
            <label>Band Width</label>
            <input type="range" id="p-width" min="0.3" max="1.5" step="0.05" value="0.8" oninput="updateGeometry()">
        </div>
        <div class="field">
            <label>Droop</label>
            <input type="range" id="p-droop" min="0" max="0.4" step="0.01" value="0.1" oninput="updateGeometry()">
        </div>
        <div class="field">
            <label>Holes</label>
            <input type="range" id="p-holes" min="0" max="10" step="1" value="5" oninput="updateBracelet()">
        </div>
    </div>

    <div id="info">Drag to rotate</div>

    <script type="importmap">
    { "imports": { "three": "https://esm.sh/three@0.171.0", "three/addons/": "https://esm.sh/three@0.171.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        function getInfo() {
            const d = document.getElementById('p-date').value;
            const dateStr = d ? new Date(d + 'T00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : '';
            const t = document.getElementById('p-time').value;
            const timeStr = t ? new Date('2000-01-01T' + t).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) : '';
            return {
                name: document.getElementById('p-name').value || '',
                date: dateStr,
                time: timeStr,
                weight: document.getElementById('p-weight').value || '',
                gender: document.getElementById('p-gender').value || '',
                hospital: document.getElementById('p-hospital').value || '',
                holes: parseInt(document.getElementById('p-holes').value) || 5,
            };
        }

        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 5);

        const controls = new OrbitControls(camera, canvas);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;
        controls.target.set(0, 0, 0);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const key = new THREE.DirectionalLight(0xfff8ee, 1.4);
        key.position.set(4, 6, 5);
        scene.add(key);
        const fill = new THREE.DirectionalLight(0xeef0ff, 0.5);
        fill.position.set(-4, 3, -3);
        scene.add(fill);

        // --- Texture ---
        let currentColor = '#f5f0ea';

        function createBandTexture(info, bgColor) {
            const c = document.createElement('canvas');
            c.width = 2048;
            c.height = 512;
            const ctx = c.getContext('2d');
            const W = 2048, H = 512;

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, W, H);

            // Grain
            for (let i = 0; i < 5000; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.015})`;
                ctx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
            }

            // Holes on left portion — draw all content first, punch holes last
            const holeCount = info.holes || 5;
            // Compensate for texture stretch: canvas ratio vs band ratio
            const canvasRatio = W / H; // 4
            const bandLen = parseFloat(document.getElementById('p-length').value) || 5;
            const bandW = parseFloat(document.getElementById('p-width').value) || 0.8;
            const bandRatio = bandLen / bandW; // ~6.25
            const yScale = canvasRatio / bandRatio; // <1, so stretch Y radius up
            const holeR = 28;
            const holes = [];
            for (let i = 0; i < holeCount; i++) {
                holes.push({ x: 120 + i * 100, y: H / 2, rx: holeR, ry: holeR / yScale });
            }

            // Info on right portion — vertically centered
            const tx = 800;
            const midY = H / 2;
            let ty = midY - 100;

            // Hospital (if set)
            if (info.hospital) {
                ctx.fillStyle = '#999';
                ctx.font = '20px system-ui, sans-serif';
                ctx.fillText(info.hospital, tx, ty);
                ty += 30;
            }

            // Name
            ctx.fillStyle = '#1a1a1a';
            ctx.font = 'bold 52px system-ui, sans-serif';
            ctx.fillText(info.name, tx, ty);
            ty += 16;

            ctx.strokeStyle = 'rgba(0,0,0,0.08)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(tx, ty);
            ctx.lineTo(tx + 650, ty);
            ctx.stroke();
            ty += 36;

            // Date & time
            ctx.font = '30px system-ui, sans-serif';
            ctx.fillStyle = '#444';
            const dateTime = [info.date, info.time].filter(Boolean).join('   ');
            ctx.fillText(dateTime, tx, ty);
            ty += 40;

            // Weight & gender
            const details = [];
            if (info.weight) details.push('Weight: ' + info.weight);
            if (info.gender) details.push('Gender: ' + info.gender);
            ctx.fillText(details.join('      '), tx, ty);
            ty += 42;

            // Barcode
            for (let i = 0; i < 50; i++) {
                const w = Math.random() > 0.5 ? 3 : 1.5;
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(tx + i * 6.5, ty, w, 36);
            }

            // Punch holes last (after all drawing) so they cut through everything
            for (const h of holes) {
                ctx.save();
                ctx.beginPath();
                ctx.ellipse(h.x, h.y, h.rx, h.ry, 0, 0, Math.PI * 2);
                ctx.clip();
                ctx.clearRect(h.x - h.rx - 2, h.y - h.ry - 2, h.rx * 2 + 4, h.ry * 2 + 4);
                ctx.restore();
                ctx.strokeStyle = 'rgba(0,0,0,0.15)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.ellipse(h.x, h.y, h.rx, h.ry, 0, 0, Math.PI * 2);
                ctx.stroke();
            }

            return new THREE.CanvasTexture(c);
        }

        // --- Roughness map for plastic grain ---
        const roughCanvas = document.createElement('canvas');
        roughCanvas.width = 512; roughCanvas.height = 128;
        const rctx = roughCanvas.getContext('2d');
        rctx.fillStyle = '#b0b0b0';
        rctx.fillRect(0, 0, 512, 128);
        for (let i = 0; i < 10000; i++) {
            const v = 155 + Math.random() * 50;
            rctx.fillStyle = `rgb(${v},${v},${v})`;
            rctx.fillRect(Math.random() * 512, Math.random() * 128, 2, 1);
        }
        const roughnessMap = new THREE.CanvasTexture(roughCanvas);

        // --- Band ---
        // Soft matte plastic - like a real hospital wristband
        const bandMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            roughness: 0.7,
            metalness: 0.0,
            clearcoat: 0.15,
            clearcoatRoughness: 0.6,
            sheen: 0.4,
            sheenRoughness: 0.8,
            sheenColor: new THREE.Color(0xe8e0d8),
            roughnessMap: roughnessMap,
            transparent: true,
            alphaTest: 0.5,
            side: THREE.DoubleSide,
        });

        let band = null;
        const segsX = 120, segsY = 8;

        function buildBand(len, w, droopAmt) {
            const geo = new THREE.PlaneGeometry(len, w, segsX, segsY);
            const pos = geo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const t = (x / len) + 0.5;
                const droop = droopAmt * (Math.cosh((t - 0.5) * 2.5) - 1) / (Math.cosh(1.25) - 1);
                pos.setZ(i, -droop);
            }
            geo.computeVertexNormals();
            return geo;
        }

        // --- Shared helpers for oval bands ---
        function createLabelTexture(info) {
            const lc = document.createElement('canvas');
            lc.width = 512; lc.height = 150;
            const ctx = lc.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 512, 150);
            ctx.strokeStyle = 'rgba(0,0,0,0.04)';
            ctx.lineWidth = 1;
            ctx.strokeRect(2, 2, 508, 146);

            let ty = 24;
            if (info.hospital) {
                ctx.font = '12px system-ui, sans-serif';
                ctx.fillStyle = '#aaa';
                ctx.fillText(info.hospital, 14, ty);
                ty += 18;
            }
            ctx.font = 'bold 22px system-ui, sans-serif';
            ctx.fillStyle = '#1a1a1a';
            ctx.fillText(info.name, 14, ty);
            ty += 24;
            ctx.font = '13px system-ui, sans-serif';
            ctx.fillStyle = '#555';
            const dt = [info.date, info.time].filter(Boolean).join('  ');
            if (dt) ctx.fillText('DOB: ' + dt, 14, ty);
            ty += 18;
            const dets = [];
            if (info.weight) dets.push(info.weight);
            if (info.gender) dets.push(info.gender);
            if (dets.length) ctx.fillText(dets.join('  ·  '), 14, ty);
            ty += 16;
            for (let i = 0; i < 28; i++) {
                const w = Math.random() > 0.5 ? 2 : 1;
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(14 + i * 4, ty, w, 12);
            }
            return new THREE.CanvasTexture(lc);
        }

        function addCurvedLabel(group, rx, ry, bandW, info) {
            // Label follows the oval curve on the outside (left side, around angle PI)
            const labelArcSpan = 0.35; // portion of the oval the label covers
            const labelSegs = 40;
            const labelOffset = 0.004; // slightly outside the band
            const labelPoints = [];
            for (let i = 0; i <= labelSegs; i++) {
                const angle = Math.PI - labelArcSpan / 2 + (i / labelSegs) * labelArcSpan;
                labelPoints.push(new THREE.Vector3(
                    Math.cos(angle) * (rx + labelOffset),
                    0,
                    Math.sin(angle) * (ry + labelOffset)
                ));
            }
            const labelCurve = new THREE.CatmullRomCurve3(labelPoints, false);
            const labelShape = new THREE.Shape();
            const lw = bandW / 2;
            const lt = 0.001;
            labelShape.moveTo(-lw, -lt);
            labelShape.lineTo(lw, -lt);
            labelShape.lineTo(lw, lt);
            labelShape.lineTo(-lw, lt);
            labelShape.lineTo(-lw, -lt);

            const labelGeo = new THREE.ExtrudeGeometry(labelShape, {
                steps: labelSegs * 2,
                bevelEnabled: false,
                extrudePath: labelCurve,
            });

            const labelTex = createLabelTexture(info);
            const labelMat = new THREE.MeshPhysicalMaterial({
                map: labelTex,
                color: 0xffffff,
                roughness: 0.55,
                clearcoat: 0.15,
                side: THREE.DoubleSide,
            });
            const label = new THREE.Mesh(labelGeo, labelMat);
            group.add(label);
        }

        function addHoles(group, rx, ry, bandW, holeCount) {
            // Place holes along the right side of the oval (around angle 0)
            const holeMat = new THREE.MeshBasicMaterial({ color: 0xFAF6F1 });
            for (let i = 0; i < holeCount; i++) {
                const t = -0.12 + (i / Math.max(holeCount - 1, 1)) * 0.24;
                const angle = t;
                const hx = Math.cos(angle) * rx;
                const hz = Math.sin(angle) * ry;
                const holeGeo = new THREE.CylinderGeometry(0.012, 0.012, bandW * 1.5, 12);
                const hole = new THREE.Mesh(holeGeo, holeMat);
                hole.position.set(hx, 0, hz);
                hole.rotation.z = Math.PI / 2;
                group.add(hole);
                // Rim
                const rimGeo = new THREE.TorusGeometry(0.012, 0.002, 6, 16);
                const rimMat = new THREE.MeshPhysicalMaterial({ color: 0xd8d0c8, roughness: 0.4 });
                const rim = new THREE.Mesh(rimGeo, rimMat);
                rim.position.set(hx, bandW * 0.75 + 0.001, hz);
                rim.rotation.x = Math.PI / 2;
                rim.rotation.z = Math.PI / 2;
                group.add(rim);
            }
        }

        function addSnap(group, x, z) {
            const snapGeo = new THREE.CylinderGeometry(0.035, 0.04, 0.014, 24);
            const snapMat = new THREE.MeshPhysicalMaterial({
                color: 0xfafafa, roughness: 0.2, metalness: 0.05, clearcoat: 0.5,
            });
            const snap = new THREE.Mesh(snapGeo, snapMat);
            snap.position.set(x, 0, z);
            snap.rotation.z = Math.PI / 2;
            group.add(snap);
        }

        function buildCurvedBand() {
            const group = new THREE.Group();
            const info = getInfo();
            const bandW = 0.10;
            const rx = 0.7, ry = 0.45;
            const ovalSegs = 200;

            // Closed oval path
            const ovalPoints = [];
            for (let i = 0; i <= ovalSegs; i++) {
                const angle = (i / ovalSegs) * Math.PI * 2;
                ovalPoints.push(new THREE.Vector3(Math.cos(angle) * rx, 0, Math.sin(angle) * ry));
            }
            const ovalCurve = new THREE.CatmullRomCurve3(ovalPoints, true);

            const shape = new THREE.Shape();
            const sw = bandW / 2, st = 0.002;
            shape.moveTo(-sw, -st); shape.lineTo(sw, -st);
            shape.lineTo(sw, st); shape.lineTo(-sw, st); shape.lineTo(-sw, -st);

            const bandGeo = new THREE.ExtrudeGeometry(shape, {
                steps: ovalSegs * 2, bevelEnabled: false, extrudePath: ovalCurve,
            });

            const bandMat2 = new THREE.MeshPhysicalMaterial({
                color: new THREE.Color(currentColor),
                roughness: 0.7, clearcoat: 0.15, clearcoatRoughness: 0.6,
                sheen: 0.3, sheenRoughness: 0.8, sheenColor: new THREE.Color(0xe8e0d8),
                side: THREE.DoubleSide,
            });
            group.add(new THREE.Mesh(bandGeo, bandMat2));

            addSnap(group, rx, 0);
            addHoles(group, rx, ry, bandW, info.holes || 5);
            addCurvedLabel(group, rx, ry, bandW, info);

            group.rotation.x = -0.25;
            return group;
        }

        function buildClinicalBand() {
            const group = new THREE.Group();
            const info = getInfo();
            const bandW = 0.08;
            const rx = 0.65, ry = 0.42;
            const ovalSegs = 200;
            const arcSpan = Math.PI * 1.85;

            const ovalPoints = [];
            for (let i = 0; i <= ovalSegs; i++) {
                const angle = (i / ovalSegs) * arcSpan - arcSpan * 0.5;
                ovalPoints.push(new THREE.Vector3(Math.cos(angle) * rx, 0, Math.sin(angle) * ry));
            }
            const ovalCurve = new THREE.CatmullRomCurve3(ovalPoints, false);

            const shape = new THREE.Shape();
            const sw = bandW / 2, st = 0.003;
            shape.moveTo(-sw, -st); shape.lineTo(sw, -st);
            shape.lineTo(sw, st); shape.lineTo(-sw, st); shape.lineTo(-sw, -st);

            const bandGeo = new THREE.ExtrudeGeometry(shape, {
                steps: ovalSegs * 2, bevelEnabled: false, extrudePath: ovalCurve,
            });

            const pvcMat = new THREE.MeshPhysicalMaterial({
                color: new THREE.Color(currentColor),
                roughness: 0.45, clearcoat: 0.3, clearcoatRoughness: 0.3,
                sheen: 0.15, sheenRoughness: 0.5, sheenColor: new THREE.Color(0xeee8e0),
                side: THREE.DoubleSide,
            });
            group.add(new THREE.Mesh(bandGeo, pvcMat));

            const endPt = ovalCurve.getPoint(0.5);
            addSnap(group, endPt.x, endPt.z);
            addHoles(group, rx, ry, bandW, info.holes || 5);
            addCurvedLabel(group, rx, ry, bandW, info);

            return group;
        }

        function refreshBracelet() {
            if (band) scene.remove(band);

            const style = document.getElementById('p-style').value;

            if (style === 'curved') {
                band = buildCurvedBand();
                band.rotation.x = -0.2;
                band.rotation.y = 0.3;
                scene.add(band);
                return;
            }

            if (style === 'clinical') {
                band = buildClinicalBand();
                band.rotation.x = -0.2;
                band.rotation.y = 0.3;
                scene.add(band);
                return;
            }

            const len = parseFloat(document.getElementById('p-length').value);
            const w = parseFloat(document.getElementById('p-width').value);
            const droop = parseFloat(document.getElementById('p-droop').value);
            const info = getInfo();

            const geo = buildBand(len, w, droop);
            bandMat.map = createBandTexture(info, currentColor);
            bandMat.map.needsUpdate = true;

            band = new THREE.Mesh(geo, bandMat);
            band.rotation.x = -0.3;

            // Clasp
            const claspGeo = new THREE.BoxGeometry(0.15, w * 0.5, 0.02);
            const claspMat = new THREE.MeshPhysicalMaterial({
                color: 0xf0ebe4, roughness: 0.25, metalness: 0.05, clearcoat: 0.3,
            });
            const clasp = new THREE.Mesh(claspGeo, claspMat);
            clasp.position.set(len / 2 + 0.1, 0, -droop * 0.5);
            band.add(clasp);

            const snapGeo = new THREE.CylinderGeometry(0.035, 0.04, 0.012, 16);
            const snapMat = new THREE.MeshPhysicalMaterial({ color: 0xfafafa, roughness: 0.15, metalness: 0.1 });
            const snap = new THREE.Mesh(snapGeo, snapMat);
            snap.rotation.x = Math.PI / 2;
            snap.position.y = 0.015;
            clasp.add(snap);

            scene.add(band);
        }

        refreshBracelet();

        // --- Controls ---
        window.setColor = function(btn) {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentColor = btn.dataset.color;
            refreshBracelet();
        };

        window.updateBracelet = function() { refreshBracelet(); };
        window.updateGeometry = function() { refreshBracelet(); };

        // --- Animate ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        let idleTimer;
        canvas.addEventListener('pointerdown', () => {
            controls.autoRotate = false;
            clearTimeout(idleTimer);
        });
        canvas.addEventListener('pointerup', () => {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => { controls.autoRotate = true; }, 3000);
        });
    </script>
</body>
</html>
