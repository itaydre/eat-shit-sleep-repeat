<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baby Bracelet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #FAF6F1; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #colors {
            position: fixed; bottom: 60px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 12px;
        }
        .color-btn {
            width: 36px; height: 36px; border-radius: 50%;
            border: 3px solid transparent; cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .color-btn.active { border-color: #5a4a3a; transform: scale(1.15); }
        #info {
            position: fixed; bottom: 24px; left: 0; right: 0;
            text-align: center; font-size: 13px; color: #9A8A7A;
            pointer-events: none; font-family: system-ui, sans-serif;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="colors">
        <button class="color-btn active" data-color="0.92,0.93,0.96" data-bg="#e0e2ec" style="background:#dce0ee;" onclick="setColor(this)"></button>
        <button class="color-btn" data-color="0.85,0.92,0.97" data-bg="#d4e6f1" style="background:#d4e6f1;" onclick="setColor(this)"></button>
        <button class="color-btn" data-color="0.97,0.87,0.87" data-bg="#f5d5d5" style="background:#f5d5d5;" onclick="setColor(this)"></button>
        <button class="color-btn" data-color="0.87,0.97,0.87" data-bg="#d5f5d5" style="background:#d5f5d5;" onclick="setColor(this)"></button>
        <button class="color-btn" data-color="0.94,0.90,0.97" data-bg="#f0e4f5" style="background:#f0e4f5;" onclick="setColor(this)"></button>
    </div>
    <div id="info">Drag to rotate</div>

    <script type="importmap">
    { "imports": { "three": "https://esm.sh/three@0.171.0", "three/addons/": "https://esm.sh/three@0.171.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const babyInfo = {
            name: 'Baby Dreyfus',
            date: 'March 14, 2026',
            time: '10:30 AM',
            weight: '3,200g',
            gender: 'Boy',
            id: '24502293-1'
        };

        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(32, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.8, 4.5);

        const controls = new OrbitControls(camera, canvas);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.2;
        controls.target.set(0, 0, 0);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const key = new THREE.DirectionalLight(0xfff8ee, 1.2);
        key.position.set(3, 5, 4);
        scene.add(key);
        const fill = new THREE.DirectionalLight(0xe8eeff, 0.4);
        fill.position.set(-3, 2, -2);
        scene.add(fill);
        const rim = new THREE.DirectionalLight(0xffffff, 0.3);
        rim.position.set(0, -2, 3);
        scene.add(rim);

        // --- Band texture ---
        function createBandTexture(info, bgColor) {
            const c = document.createElement('canvas');
            const W = 2048, H = 256;
            c.width = W; c.height = H;
            const ctx = c.getContext('2d');

            // Translucent plastic background
            ctx.fillStyle = bgColor || '#dce0ee';
            ctx.fillRect(0, 0, W, H);

            // Subtle grain
            for (let i = 0; i < 3000; i++) {
                ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.04})`;
                ctx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
            }
            for (let i = 0; i < 1500; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.02})`;
                ctx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
            }

            // --- Holes section (left ~30% of band, u = 0.0 to 0.3) ---
            const holesStart = W * 0.05;
            for (let i = 0; i < 7; i++) {
                const hx = holesStart + i * 65;
                const hy = H / 2;
                ctx.save();
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(hx, hy, 16, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                // Rim shadow
                ctx.strokeStyle = 'rgba(0,0,0,0.08)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(hx, hy, 16, 0, Math.PI * 2);
                ctx.stroke();
            }

            // --- Snap button area (around u ~0.32) ---
            const snapX = W * 0.32;
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.beginPath();
            ctx.arc(snapX, H / 2, 14, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.06)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(snapX, H / 2, 14, 0, Math.PI * 2);
            ctx.stroke();

            // --- Label/sticker section (u ~0.5 to 0.9) - yellowish sticker ---
            const labelX = W * 0.42;
            const labelW = W * 0.45;
            const labelY = H * 0.12;
            const labelH = H * 0.76;
            const r = 8;

            // Sticker background
            ctx.fillStyle = '#f0e6c8';
            ctx.beginPath();
            ctx.moveTo(labelX + r, labelY);
            ctx.lineTo(labelX + labelW - r, labelY);
            ctx.arcTo(labelX + labelW, labelY, labelX + labelW, labelY + r, r);
            ctx.lineTo(labelX + labelW, labelY + labelH - r);
            ctx.arcTo(labelX + labelW, labelY + labelH, labelX + labelW - r, labelY + labelH, r);
            ctx.lineTo(labelX + r, labelY + labelH);
            ctx.arcTo(labelX, labelY + labelH, labelX, labelY + labelH - r, r);
            ctx.lineTo(labelX, labelY + r);
            ctx.arcTo(labelX, labelY, labelX + r, labelY, r);
            ctx.fill();

            // Sticker border
            ctx.strokeStyle = 'rgba(0,0,0,0.05)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Form lines on sticker
            const lx = labelX + 16;
            const lw = labelW - 32;
            ctx.strokeStyle = 'rgba(0,0,0,0.12)';
            ctx.lineWidth = 0.5;
            for (let i = 1; i <= 4; i++) {
                const ly = labelY + labelH * (i / 5);
                ctx.beginPath();
                ctx.moveTo(lx, ly);
                ctx.lineTo(lx + lw, ly);
                ctx.stroke();
            }

            // Text on sticker
            const tx = lx + 4;
            let ty = labelY + 36;

            ctx.fillStyle = '#2a2016';
            ctx.font = 'bold 28px system-ui, sans-serif';
            ctx.fillText(info.name, tx, ty);
            ty += 34;

            ctx.font = '18px system-ui, sans-serif';
            ctx.fillStyle = '#4a3a2a';
            ctx.fillText(info.date + '  ' + info.time, tx, ty);
            ty += 26;

            ctx.fillText('Weight: ' + info.weight + '   Gender: ' + info.gender, tx, ty);
            ty += 28;

            // ID
            ctx.font = '14px monospace';
            ctx.fillStyle = '#6a5a4a';
            ctx.fillText('ID: ' + info.id, tx, ty);
            ty += 6;

            // Barcode
            const by = ty + 4;
            for (let i = 0; i < 40; i++) {
                const w = Math.random() > 0.5 ? 2.5 : 1;
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(tx + i * 5, by, w, 22);
            }

            const tex = new THREE.CanvasTexture(c);
            return tex;
        }

        // --- Oval loop geometry using TubeGeometry ---
        // Elliptical path
        class EllipseCurve3D extends THREE.Curve {
            constructor(rx, ry) {
                super();
                this.rx = rx;
                this.ry = ry;
            }
            getPoint(t) {
                const angle = t * Math.PI * 2;
                return new THREE.Vector3(
                    Math.cos(angle) * this.rx,
                    0,
                    Math.sin(angle) * this.ry
                );
            }
        }

        const ovalPath = new EllipseCurve3D(1.2, 0.7);
        const bandThick = 0.008;
        const bandHeight = 0.06;

        // Custom flat cross-section via TubeGeometry with custom frames
        // Instead, use ExtrudeGeometry along the oval path
        const bandShape = new THREE.Shape();
        const bh = bandHeight / 2;
        const bt = bandThick / 2;
        bandShape.moveTo(-bh, -bt);
        bandShape.lineTo(bh, -bt);
        bandShape.lineTo(bh, bt);
        bandShape.lineTo(-bh, bt);
        bandShape.lineTo(-bh, -bt);

        const bandGeo = new THREE.ExtrudeGeometry(bandShape, {
            steps: 200,
            bevelEnabled: false,
            extrudePath: ovalPath,
        });

        // Fix UVs to map texture along the loop
        const uvAttr = bandGeo.attributes.uv;
        const posAttr = bandGeo.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            const x = posAttr.getX(i);
            const z = posAttr.getZ(i);
            const angle = Math.atan2(z, x);
            const u = ((angle / (Math.PI * 2)) + 1) % 1;
            const y = posAttr.getY(i);
            const v = (y + bh) / (2 * bh);
            uvAttr.setXY(i, u, v);
        }
        uvAttr.needsUpdate = true;

        let currentBg = '#dce0ee';
        let bandTexture = createBandTexture(babyInfo, currentBg);

        const bandMat = new THREE.MeshPhysicalMaterial({
            map: bandTexture,
            color: 0xffffff,
            roughness: 0.3,
            metalness: 0.0,
            clearcoat: 0.6,
            clearcoatRoughness: 0.1,
            transparent: true,
            alphaTest: 0.3,
            transmission: 0.12,
            thickness: 0.2,
            side: THREE.DoubleSide,
        });

        const band = new THREE.Mesh(bandGeo, bandMat);
        scene.add(band);

        // --- Color picker ---
        window.setColor = function(btn) {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentBg = btn.dataset.bg;
            bandTexture = createBandTexture(babyInfo, currentBg);
            bandMat.map = bandTexture;
            bandMat.map.needsUpdate = true;
        };

        // --- Animate ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        let idleTimer;
        canvas.addEventListener('pointerdown', () => {
            controls.autoRotate = false;
            clearTimeout(idleTimer);
        });
        canvas.addEventListener('pointerup', () => {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => { controls.autoRotate = true; }, 3000);
        });
    </script>
</body>
</html>
