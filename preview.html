<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 17 Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px 80px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .phone-wrapper {
            transform-origin: top center;
        }
        .iphone {
            position: relative;
            width: 393px;
            height: 852px;
            background: #0a0a0a;
            border-radius: 55px;
            padding: 12px;
            box-shadow:
                0 0 0 2px #2a2a2a,
                0 0 0 5px #111,
                0 30px 80px rgba(0,0,0,0.6),
                inset 0 0 0 1.5px #3a3a3a;
        }
        .iphone-screen {
            width: 100%;
            height: 100%;
            border-radius: 44px;
            overflow: hidden;
            background: #000;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        /* Status bar area — reserves space so content doesn't go under Dynamic Island */
        .status-bar {
            position: relative;
            height: 54px;
            background: #5a4a3a;
            flex-shrink: 0;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 0 28px 6px;
        }
        .status-bar .time {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        .status-bar .icons {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        /* Dynamic Island */
        .dynamic-island {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 126px;
            height: 36px;
            background: #000;
            border-radius: 20px;
            z-index: 10;
        }
        /* Side buttons */
        .btn-power {
            position: absolute;
            right: -3px;
            top: 200px;
            width: 4px;
            height: 96px;
            background: #2a2a2a;
            border-radius: 0 2px 2px 0;
        }
        .btn-vol-up {
            position: absolute;
            left: -3px;
            top: 165px;
            width: 4px;
            height: 42px;
            background: #2a2a2a;
            border-radius: 2px 0 0 2px;
        }
        .btn-vol-down {
            position: absolute;
            left: -3px;
            top: 216px;
            width: 4px;
            height: 42px;
            background: #2a2a2a;
            border-radius: 2px 0 0 2px;
        }
        .btn-action {
            position: absolute;
            left: -3px;
            top: 128px;
            width: 4px;
            height: 24px;
            background: #2a2a2a;
            border-radius: 2px 0 0 2px;
        }
        iframe {
            width: 100%;
            flex: 1;
            border: none;
        }
        /* Home indicator */
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 134px;
            height: 5px;
            background: #555;
            border-radius: 3px;
            z-index: 10;
        }
        .url-bar {
            position: fixed;
            bottom: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: #2a2a2a;
            padding: 6px 10px;
            border-radius: 10px;
            z-index: 100;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .url-bar:hover { opacity: 1; }
        .url-bar input {
            background: #3a3a3a;
            border: none;
            color: #ccc;
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 6px;
            width: 160px;
            font-family: inherit;
            outline: none;
        }
        .url-bar button {
            background: #5a4a3a;
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            white-space: nowrap;
        }
        .url-bar button:hover { background: #6b5a4a; }
        .label {
            color: #555;
            font-size: 11px;
            margin-bottom: 16px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="phone-wrapper" id="phone-wrapper">
        <div class="iphone">
            <div class="btn-power"></div>
            <div class="btn-action"></div>
            <div class="btn-vol-up"></div>
            <div class="btn-vol-down"></div>
            <div class="iphone-screen">
                <div class="dynamic-island"></div>
                <div class="status-bar">
                    <span class="time">9:41</span>
                    <div class="icons">
                        <svg width="16" height="11" viewBox="0 0 16 11" fill="white"><rect x="0" y="3" width="3" height="8" rx="0.8"/><rect x="4.5" y="2" width="3" height="9" rx="0.8"/><rect x="9" y="0" width="3" height="11" rx="0.8"/><rect x="13" y="0" width="3" height="11" rx="0.8"/></svg>
                    </div>
                </div>
                <iframe id="preview" src="index.html"></iframe>
                <div class="home-indicator"></div>
            </div>
        </div>
    </div>
    <div class="url-bar">
        <input type="text" id="url-input" value="index.html" placeholder="URL or local file..." />
        <button onclick="loadURL()">Load</button>
        <button onclick="document.getElementById('preview').contentWindow.location.reload()">Reload</button>
    </div>
    <script>
        function loadURL() {
            const url = document.getElementById('url-input').value;
            document.getElementById('preview').src = url;
        }
        document.getElementById('url-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') loadURL();
        });

        // Scale phone to fit viewport
        function fitPhone() {
            const wrapper = document.getElementById('phone-wrapper');
            const vh = window.innerHeight - 140; // padding for label + url bar
            const phoneH = 852 + 24 + 10; // phone + border + shadow
            const scale = Math.min(1, vh / phoneH);
            wrapper.style.transform = `scale(${scale})`;
        }
        fitPhone();
        window.addEventListener('resize', fitPhone);
    </script>
</body>
</html>
