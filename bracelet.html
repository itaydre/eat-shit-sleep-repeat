<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baby Bracelet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #FAF6F1; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #colors {
            position: fixed;
            bottom: 60px;
            left: 0; right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .color-btn {
            width: 36px; height: 36px; border-radius: 50%;
            border: 3px solid transparent; cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .color-btn.active { border-color: #5a4a3a; transform: scale(1.15); }
        #info {
            position: fixed; bottom: 24px; left: 0; right: 0;
            text-align: center; font-size: 13px; color: #9A8A7A;
            pointer-events: none; font-family: system-ui, sans-serif;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="colors">
        <button class="color-btn active" data-color="#f5f0ea" style="background:#f5f0ea;" onclick="setColor(this)"></button>
        <button class="color-btn" data-color="#d4e6f1" style="background:#d4e6f1;" onclick="setColor(this)"></button>
        <button class="color-btn" data-color="#f5d5d5" style="background:#f5d5d5;" onclick="setColor(this)"></button>
        <button class="color-btn" data-color="#d5f5d5" style="background:#d5f5d5;" onclick="setColor(this)"></button>
        <button class="color-btn" data-color="#f0e4f5" style="background:#f0e4f5;" onclick="setColor(this)"></button>
    </div>
    <div id="info">Drag to rotate</div>

    <script type="importmap">
    { "imports": { "three": "https://esm.sh/three@0.171.0", "three/addons/": "https://esm.sh/three@0.171.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const babyInfo = {
            name: 'Baby Dreyfus',
            date: 'March 14, 2026',
            time: '10:30 AM',
            weight: '3,200g',
            gender: 'Boy',
            id: '13672332'
        };

        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 5);

        const controls = new OrbitControls(camera, canvas);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;
        controls.target.set(0, 0, 0);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const key = new THREE.DirectionalLight(0xfff8ee, 1.4);
        key.position.set(4, 6, 5);
        scene.add(key);
        const fill = new THREE.DirectionalLight(0xeef0ff, 0.5);
        fill.position.set(-4, 3, -3);
        scene.add(fill);

        // --- Texture ---
        let currentColor = '#f5f0ea';

        function createBandTexture(info, bgColor) {
            const c = document.createElement('canvas');
            c.width = 2048;
            c.height = 512;
            const ctx = c.getContext('2d');
            const W = 2048, H = 512;

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, W, H);

            // Grain
            for (let i = 0; i < 5000; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.015})`;
                ctx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
            }

            // Holes on left portion
            for (let i = 0; i < 8; i++) {
                const hx = 100 + i * 72;
                const hy = H / 2;
                ctx.save();
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(hx, hy, 36, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(hx, hy, 36, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Info on right portion — vertically centered
            const tx = 800;
            const midY = H / 2;

            ctx.fillStyle = '#1a1a1a';
            ctx.font = 'bold 52px system-ui, sans-serif';
            ctx.fillText(info.name, tx, midY - 80);

            ctx.strokeStyle = 'rgba(0,0,0,0.08)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(tx, midY - 60);
            ctx.lineTo(tx + 650, midY - 60);
            ctx.stroke();

            ctx.font = '30px system-ui, sans-serif';
            ctx.fillStyle = '#444';
            ctx.fillText(info.date + '   ' + info.time, tx, midY - 20);
            ctx.fillText('Weight: ' + info.weight + '      Gender: ' + info.gender, tx, midY + 20);

            ctx.font = '22px monospace';
            ctx.fillStyle = '#888';
            ctx.fillText('ID: ' + info.id, tx, midY + 60);

            // Barcode
            for (let i = 0; i < 50; i++) {
                const w = Math.random() > 0.5 ? 3 : 1.5;
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(tx + i * 6.5, midY + 75, w, 36);
            }

            const tex = new THREE.CanvasTexture(c);
            return tex;
        }

        // --- Band: PlaneGeometry with vertex displacement for droop ---
        const bandLen = 5.0;
        const bandW = 0.25;
        const segsX = 120;
        const segsY = 8;

        const planeGeo = new THREE.PlaneGeometry(bandLen, bandW, segsX, segsY);
        const pos = planeGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const t = (x / bandLen) + 0.5; // 0..1
            const droop = 0.1 * (Math.cosh((t - 0.5) * 2.5) - 1) / (Math.cosh(1.25) - 1);
            pos.setZ(i, -droop);
        }
        planeGeo.computeVertexNormals();

        let bandTexture = createBandTexture(babyInfo, currentColor);

        const bandMat = new THREE.MeshPhysicalMaterial({
            map: bandTexture,
            color: 0xffffff,
            roughness: 0.35,
            metalness: 0.0,
            clearcoat: 0.5,
            clearcoatRoughness: 0.15,
            transparent: true,
            alphaTest: 0.5,
            side: THREE.DoubleSide,
        });

        const band = new THREE.Mesh(planeGeo, bandMat);
        band.rotation.x = -0.3;
        scene.add(band);

        // Clasp at right end
        const claspGeo = new THREE.BoxGeometry(0.15, 0.16, 0.02);
        const claspMat = new THREE.MeshPhysicalMaterial({
            color: 0xf0ebe4, roughness: 0.25, metalness: 0.05, clearcoat: 0.3,
        });
        const clasp = new THREE.Mesh(claspGeo, claspMat);
        clasp.position.set(bandLen / 2 + 0.1, 0, -0.1);
        band.add(clasp);

        const snapGeo = new THREE.CylinderGeometry(0.035, 0.04, 0.012, 16);
        const snapMat = new THREE.MeshPhysicalMaterial({ color: 0xfafafa, roughness: 0.15, metalness: 0.1 });
        const snap = new THREE.Mesh(snapGeo, snapMat);
        snap.rotation.x = Math.PI / 2;
        snap.position.y = 0.015;
        clasp.add(snap);

        // --- Color picker ---
        window.setColor = function(btn) {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentColor = btn.dataset.color;
            bandTexture = createBandTexture(babyInfo, currentColor);
            bandMat.map = bandTexture;
            bandMat.map.needsUpdate = true;
        };

        // --- Animate ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        let idleTimer;
        canvas.addEventListener('pointerdown', () => {
            controls.autoRotate = false;
            clearTimeout(idleTimer);
        });
        canvas.addEventListener('pointerup', () => {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => { controls.autoRotate = true; }, 3000);
        });
    </script>
</body>
</html>
